<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Deploy 2048 - GenLayer</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #16213e; padding: 32px; border-radius: 16px; max-width: 500px; text-align: center; }
    h1 { margin: 0 0 8px; color: #edc22e; }
    p { color: #ccc; margin: 8px 0 20px; font-size: 14px; }
    .status { background: #0f3460; padding: 12px; border-radius: 8px; margin: 16px 0; font-size: 13px; word-break: break-all; min-height: 20px; }
    button { background: #e94560; color: #fff; border: none; padding: 12px 32px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.success { background: #21bf73; }
    .addr { font-size: 12px; color: #888; margin-top: 12px; }
    a { color: #4fc3f7; }
  </style>

<body>
  <div class="card">
    <h1>🎮 2048</h1>
    <p>Deploy Game2048 Intelligent Contract ke GenLayer Testnet Chain</p>
    
    <div id="status" class="status">⏳ Connect MetaMask dulu...</div>
    
    <button id="deployBtn" onclick="deploy()" disabled>🦊 Connect MetaMask</button>
    
    <div class="addr" id="info"></div>
  </div>

  <script>
    async function connect() {
      if (typeof ethereum === 'undefined') {
        document.getElementById('status').innerText = '❌ Install MetaMask dulu!';
        return;
      }
      try {
        // Switch to GenLayer Testnet Chain
        try {
          await ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x1079' }] });
        } catch (e) {
          if (e.code === 4902) {
            await ethereum.request({ method: 'wallet_addEthereumChain', params: [{
              chainId: '0x1079', chainName: 'GenLayer Testnet Chain',
              nativeCurrency: { name: 'GEN', symbol: 'GEN', decimals: 18 },
              rpcUrls: ['https://rpc.testnet-chain.genlayer.com'],
              blockExplorerUrls: ['https://explorer.testnet-chain.genlayer.com'],
            }]});
          }
        }
        const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
        document.getElementById('info').innerText = `Wallet: ${accounts[0].slice(0,6)}...${accounts[0].slice(-4)}`;
        document.getElementById('deployBtn').disabled = false;
        document.getElementById('deployBtn').innerText = '🚀 Deploy Contract';
        document.getElementById('status').innerText = '✅ Connected! Klik Deploy untuk mulai.';
        window.account = accounts[0];
      } catch (e) {
        document.getElementById('status').innerText = '❌ ' + (e.message || e);
      }
    }

    async function deploy() {
      const btn = document.getElementById('deployBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.innerText = '⏳ Deploying...';

      try {
        // Deploy: send transaction WITHOUT to field (contract creation)
        const txHash = await ethereum.request({
          method: 'eth_sendTransaction',
          params: [{
            from: window.account,
            data: deployData,
          }],
        });
        
        status.innerText = `✅ Tx sent! Hash: ${txHash.slice(0,18)}...`;
        status.innerHTML += `<br><br>⏳ Tunggu consensus (~15-30 detik)<br><br>`;
        status.innerHTML += `📋 Cek di <a href="https://explorer.testnet-chain.genlayer.com/tx/${txHash}" target="_blank">Explorer</a>`;
        
        btn.innerText = '✅ Deploy Submitted!';
        btn.className = 'success';
        
        // Poll for tx receipt to get contract address
        let attempts = 0;
        const check = setInterval(async () => {
          attempts++;
          try {
            const receipt = await ethereum.request({
              method: 'eth_getTransactionReceipt',
              params: [txHash],
            });
            if (receipt && receipt.contractAddress) {
              clearInterval(check);
              status.innerHTML += `<br><br>🎯 <b>Contract Address: ${receipt.contractAddress}</b><br>`;
              status.innerHTML += `🔗 <a href="https://explorer.testnet-chain.genlayer.com/address/${receipt.contractAddress}" target="_blank">Buka di Explorer</a>`;
              btn.innerText = '✅ Deployed!';
            }
          } catch(e) {}
          if (attempts > 30) { // 30 * 3s = 90s timeout
            clearInterval(check);
            status.innerHTML += `<br><br>⏰ Timeout. Cek manual di Explorer pake tx hash di atas.`;
          }
        }, 3000);
        
      } catch (e) {
